<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OCR 出力ビューア</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #111827; color: #f3f4f6; font-family: system-ui, sans-serif; }
  main { max-width: 1400px; margin: 0 auto; padding: 20px 16px 60px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #9ca3af; font-size: 13px; margin: 0 0 16px; }
  .sub a { color: #93c5fd; }
  .panel { background: #1f2937; border: 1px solid #374151; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
  label { font-size: 13px; color: #9ca3af; display: block; margin-bottom: 4px; }
  select, input[type=file] { background: #111827; color: #f3f4f6; border: 1px solid #4b5563; border-radius: 8px; padding: 8px 10px; font-size: 14px; }
  button { background: #4f46e5; color: white; border: none; border-radius: 8px; padding: 9px 16px; font-size: 14px; cursor: pointer; }
  button:hover { background: #6366f1; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
  .status { font-size: 14px; margin-left: 8px; }
  .status.error { color: #fca5a5; }
  .status.ok { color: #86efac; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #6366f1; border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toolbar { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; font-size: 13px; }
  .toolbar label { display: inline-flex; align-items: center; gap: 6px; margin: 0; color: #d1d5db; }
  .toolbar input[type=range] { vertical-align: middle; }

  .work { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .viewer { flex: 1 1 520px; min-width: 320px; }
  .canvas-wrap { position: relative; overflow: auto; max-height: 78vh; border: 1px solid #374151; border-radius: 10px; background: #0b0f19; }
  .stage { position: relative; width: 100%; line-height: 0; }
  .stage img { width: 100%; height: auto; display: block; }
  .stage svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .stage svg polygon, .stage svg rect { cursor: pointer; }

  .side { flex: 1 1 360px; min-width: 300px; max-height: 78vh; overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { padding: 5px 6px; text-align: left; border-bottom: 1px solid #263041; vertical-align: top; }
  th { position: sticky; top: 0; background: #1f2937; color: #9ca3af; font-weight: 600; }
  tr.det { cursor: pointer; }
  tr.det:hover, tr.det.active { background: #263041; }
  tr.det.dim { opacity: .3; }
  td.idx { color: #9ca3af; font-variant-numeric: tabular-nums; }
  td.score { font-variant-numeric: tabular-nums; font-weight: 600; }
  td.coord { color: #9ca3af; font-family: ui-monospace, monospace; font-size: 11px; }
  .swatch { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }

  .stats { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; margin-bottom: 10px; }
  .stat b { font-size: 18px; display: block; font-variant-numeric: tabular-nums; }
  .stat span { color: #9ca3af; }
  .legend { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #9ca3af; }
  .legend .bar { width: 120px; height: 10px; border-radius: 5px; background: linear-gradient(90deg, hsl(0 80% 55%), hsl(60 80% 55%), hsl(120 65% 45%)); }
  .idx-label { font-size: 11px; fill: #fff; paint-order: stroke; stroke: #000; stroke-width: 3px; pointer-events: none; font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<main>
  <h1>OCR 出力ビューア</h1>
  <p class="sub">PP-OCRv6 の生の検出結果（テキスト・信頼度・座標）を元画像に重ねて表示します。 &nbsp;<a href="/">← 文法下書きツールへ</a></p>

  <div class="panel">
    <div class="row">
      <div>
        <label>ページ画像</label>
        <input type="file" id="file" accept="image/*">
      </div>
      <div>
        <label>OCR言語</label>
        <select id="ocrLang">
          <option value="ch">中国語 (ch)</option>
          <option value="japan">日本語 (japan)</option>
          <option value="en">英語 (en)</option>
        </select>
      </div>
      <div>
        <button id="runBtn">OCR実行</button>
      </div>
      <span id="status" class="status"></span>
    </div>
  </div>

  <div id="resultArea" style="display:none">
    <div class="panel">
      <div class="stats">
        <div class="stat"><b id="stCount">–</b><span>検出行数</span></div>
        <div class="stat"><b id="stMin">–</b><span>最小 信頼度</span></div>
        <div class="stat"><b id="stAvg">–</b><span>平均 信頼度</span></div>
        <div class="stat"><b id="stMax">–</b><span>最大 信頼度</span></div>
        <div class="stat"><b id="stDim">–</b><span>元画像サイズ(px)</span></div>
      </div>
      <div class="toolbar">
        <label><input type="checkbox" id="tgPoly" checked> ポリゴン(rec_polys)</label>
        <label><input type="checkbox" id="tgBox"> 外接矩形(rec_boxes)</label>
        <label><input type="checkbox" id="tgLabel" checked> 番号ラベル</label>
        <label>信頼度しきい値 <input type="range" id="thr" min="0" max="1" step="0.01" value="0"> <span id="thrVal" style="font-variant-numeric:tabular-nums">0.00</span></label>
        <label>ズーム <input type="range" id="zoom" min="1" max="4" step="0.1" value="1"> <span id="zoomVal">1.0×</span></label>
        <span class="legend">低 <span class="bar"></span> 高（色=信頼度）</span>
      </div>
    </div>

    <div class="work">
      <div class="viewer">
        <div class="canvas-wrap">
          <div class="stage" id="stage">
            <img id="img" alt="">
            <svg id="svg" preserveAspectRatio="xMidYMid meet"></svg>
          </div>
        </div>
      </div>
      <div class="side panel" style="padding:0">
        <table>
          <thead>
            <tr><th style="width:34px">#</th><th>テキスト (rec_texts)</th><th style="width:60px">信頼度</th><th style="width:150px">box [x1,y1,x2,y2]</th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const SVGNS = "http://www.w3.org/2000/svg";
let items = [];          // { index, text, score, box:[x1,y1,x2,y2], poly:[[x,y]*4] }
let naturalW = 0, naturalH = 0;

fetch("/api/config").then(r => r.json()).then(c => { if (c.ocrLang) $("ocrLang").value = c.ocrLang; }).catch(() => {});

// 信頼度(0..1) → 色相(赤0..緑120)
const scoreColor = (s) => `hsl(${Math.round(s * 120)} 80% 55%)`;

$("runBtn").addEventListener("click", async () => {
  const file = $("file").files[0];
  const status = $("status");
  if (!file) { status.textContent = "画像を選択してください"; status.className = "status error"; return; }
  $("runBtn").disabled = true;
  status.className = "status";
  status.innerHTML = '<span class="spinner"></span>OCR実行中...';

  // 画像を先に表示（元画像の自然サイズ取得のため）
  const url = URL.createObjectURL(file);
  const img = $("img");
  await new Promise((res) => { img.onload = res; img.src = url; });
  naturalW = img.naturalWidth; naturalH = img.naturalHeight;

  try {
    const fd = new FormData();
    fd.append("image", file);
    fd.append("lang", $("ocrLang").value);
    const resp = await fetch("/api/ocr-detail", { method: "POST", body: fd });
    if (!resp.ok) throw new Error((await resp.json().catch(() => ({}))).detail || `HTTP ${resp.status}`);
    const data = await resp.json();
    items = data.items;
    $("resultArea").style.display = "";
    setStats();
    render();
    status.textContent = `${items.length} 行を検出`;
    status.className = "status ok";
  } catch (e) {
    status.textContent = "失敗: " + e.message;
    status.className = "status error";
  } finally {
    $("runBtn").disabled = false;
  }
});

function setStats() {
  const scores = items.map(it => it.score);
  const min = Math.min(...scores), max = Math.max(...scores);
  const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
  $("stCount").textContent = items.length;
  $("stMin").textContent = min.toFixed(3);
  $("stAvg").textContent = avg.toFixed(3);
  $("stMax").textContent = max.toFixed(3);
  $("stDim").textContent = `${naturalW}×${naturalH}`;
}

function thr() { return parseFloat($("thr").value); }
function visible(it) { return it.score >= thr(); }

function render() {
  const svg = $("svg");
  svg.setAttribute("viewBox", `0 0 ${naturalW} ${naturalH}`);
  svg.innerHTML = "";
  const showPoly = $("tgPoly").checked, showBox = $("tgBox").checked, showLabel = $("tgLabel").checked;

  items.forEach((it) => {
    if (!visible(it)) return;
    const color = scoreColor(it.score);

    if (showPoly && it.poly) {
      const pg = document.createElementNS(SVGNS, "polygon");
      pg.setAttribute("points", it.poly.map(p => p.join(",")).join(" "));
      pg.setAttribute("fill", color); pg.setAttribute("fill-opacity", "0.14");
      pg.setAttribute("stroke", color); pg.setAttribute("stroke-width", "2");
      pg.dataset.index = it.index;
      wire(pg, it);
      svg.appendChild(pg);
    }
    if (showBox && it.box) {
      const [x1, y1, x2, y2] = it.box;
      const r = document.createElementNS(SVGNS, "rect");
      r.setAttribute("x", x1); r.setAttribute("y", y1);
      r.setAttribute("width", x2 - x1); r.setAttribute("height", y2 - y1);
      r.setAttribute("fill", "none"); r.setAttribute("stroke", "#93c5fd");
      r.setAttribute("stroke-width", "1"); r.setAttribute("stroke-dasharray", "4 3");
      r.dataset.index = it.index;
      wire(r, it);
      svg.appendChild(r);
    }
    if (showLabel) {
      const anchor = (it.poly && it.poly[0]) || [it.box[0], it.box[1]];
      const t = document.createElementNS(SVGNS, "text");
      t.setAttribute("x", anchor[0] + 2); t.setAttribute("y", anchor[1] - 3);
      t.setAttribute("class", "idx-label");
      t.textContent = it.index;
      svg.appendChild(t);
    }
  });

  renderTable();
}

function wire(shape, it) {
  shape.addEventListener("mouseenter", () => highlight(it.index, true));
  shape.addEventListener("mouseleave", () => highlight(it.index, false));
  shape.addEventListener("click", () => {
    const row = document.querySelector(`tr[data-index="${it.index}"]`);
    if (row) row.scrollIntoView({ block: "center", behavior: "smooth" });
  });
}

function renderTable() {
  const tb = $("tbody");
  tb.innerHTML = "";
  items.forEach((it) => {
    const tr = document.createElement("tr");
    tr.className = "det" + (visible(it) ? "" : " dim");
    tr.dataset.index = it.index;
    tr.innerHTML =
      `<td class="idx">${it.index}</td>` +
      `<td>${escapeHtml(it.text)}</td>` +
      `<td class="score" style="color:${scoreColor(it.score)}">` +
        `<span class="swatch" style="background:${scoreColor(it.score)}"></span>${it.score.toFixed(3)}</td>` +
      `<td class="coord">${it.box ? it.box.join(", ") : "—"}</td>`;
    tr.addEventListener("mouseenter", () => highlight(it.index, true));
    tr.addEventListener("mouseleave", () => highlight(it.index, false));
    tr.addEventListener("click", () => {
      const shape = $("svg").querySelector(`[data-index="${it.index}"]`);
      if (shape) shape.scrollIntoView({ block: "center", behavior: "smooth" });
    });
    tb.appendChild(tr);
  });
}

function highlight(index, on) {
  document.querySelectorAll(`#svg [data-index="${index}"]`).forEach(el => {
    el.setAttribute("stroke-width", on ? "4" : (el.tagName === "rect" ? "1" : "2"));
    if (el.tagName === "polygon") el.setAttribute("fill-opacity", on ? "0.35" : "0.14");
  });
  const row = document.querySelector(`tr[data-index="${index}"]`);
  if (row) row.classList.toggle("active", on);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// コントロール
["tgPoly", "tgBox", "tgLabel"].forEach(id => $(id).addEventListener("change", render));
$("thr").addEventListener("input", () => { $("thrVal").textContent = thr().toFixed(2); render(); });
$("zoom").addEventListener("input", () => {
  const z = parseFloat($("zoom").value);
  $("zoomVal").textContent = z.toFixed(1) + "×";
  $("stage").style.width = (z * 100) + "%";
});
</script>
</body>
</html>
